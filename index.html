<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ElectionLens</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- DataTables -->
  <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f6f9;
    }

    .header {
      background: #1e293b;
      color: white;
      padding: 20px;
      border-radius: 10px;
    }

    .tagline {
      font-size: 14px;
      opacity: 0.8;
    }

    .card-box {
      border-radius: 12px;
      padding: 20px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      text-align: center;
    }

    .search-box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
  </style>
</head>

<body>

<div class="container mt-4">

  <!-- HEADER -->
  <div class="header text-center">
    <h2>ElectionLens</h2>
    <div class="tagline">See Elections Clearly, All in One Place</div>
  </div>

  <!-- STATS -->
  <div class="row mt-4">
    <div class="col-md-4">
      <div class="card-box">
        <h5>Total Constituencies</h5>
        <h3>234</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card-box">
        <h5>Total Parties</h5>
        <h3>10+</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card-box">
        <h5>Data Status</h5>
        <h3>Live</h3>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-box mt-4">
    <input type="text" id="customSearch" class="form-control" placeholder="Search constituency, district, candidate...">
  </div>

  <!-- TABLE -->
  <div class="mt-4">
    <table id="electionTable" class="table table-striped">
      <thead>
        <tr>
          <th>Constituency</th>
          <th>District</th>
          <th>Candidate</th>
          <th>Party</th>
        </tr>
      </thead>
    </table>
  </div>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
let table;

fetch('data.json')
.then(res => res.json())
.then(data => {
  table = $('#electionTable').DataTable({
    data: data,
    columns: [
      { data: 'constituency' },
      { data: 'district' },
      { data: 'candidate' },
      { data: 'party' }
    ]
  });

  // Custom search
  $('#customSearch').on('keyup', function () {
    table.search(this.value).draw();
  });
});
</script>

</body>
</html>
